<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timeline Viewer – Minimal DOM Layout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="style.css">
  <script src="userInterface.js" defer></script>
  <!-- <script src="panAndZoom.js" defer></script>
  <script src="timelineLogic.js" defer></script> -->
</head>

<body>

  <!-- ============================================================
       TOP MENU BAR
       ============================================================ -->
  <header class="timeline-top-bar">
  
    <div class="topbar-left">
      <h1 style="margin:0; font-size:1rem; color:#ccc;">Timeline Viewer</h1>
    </div>
    
    <div class="topbar-scroll-buttons">
      <button class="timeline-top-bar-button" id="timeline-button-load-file">Load File</button>
      <button class="timeline-top-bar-button" id="timeline-button-save-file">Save Timeline</button>
      <button id="timeline-button-add-subtimeline" class="timeline-top-bar-button">Add Sub-timeline
      </button>
      <button class="timeline-top-bar-button" id="timeline-button-add-event">Add Event</button>
      <button class="timeline-top-bar-button" id="timeline-button-delete-selected-event">Delete Selected Event</button>
    </div>
    
    <button class="timeline-top-bar-button" id="timeline-button-open-settings">Settings</button>
    
  </header>

  <!-- ============================================================
       MAIN LAYOUT ROOT
       ============================================================ -->
  <main class="timeline-layout-root">

    <!-- ============================================================
         SIDEBAR PANEL (RIGHT SIDE BY DEFAULT)
         ============================================================ -->
    <section class="timeline-event-editor-panel">

      <form class="timeline-event-editor-form" autocomplete="off">

        <!-- Selected Event -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Selected Event</div>

          <label class="timeline-field-label" for="timeline-selected-event-name-input">
            Canonical event name (editable)
          </label>
          <input id="timeline-selected-event-name-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Event ID / canonical name">
        </div>

        <div class="timeline-field-group">
          <label class="timeline-field-label" for="timeline-selected-event-visual-override-input">
            Visual override (display name)
          </label>
          <textarea id="timeline-selected-event-visual-override-input"
                    class="timeline-multiline-input"
                    placeholder="Formatted display name"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Placement -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Placement</div>

          <label class="timeline-field-label" for="timeline-selected-event-sub-timeline-input">
            Sub-timeline
          </label>
          <input id="timeline-selected-event-sub-timeline-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Sub-timeline name">

          <label class="timeline-field-label" for="timeline-selected-event-column-input">
            Column
          </label>
          <input id="timeline-selected-event-column-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Column index">
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Groups -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Groups</div>
          <textarea id="timeline-selected-event-groups-input"
                    class="timeline-multiline-input"
                    placeholder="Group names (ordered)"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Relationships -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Relationships</div>

          <label class="timeline-field-label">Prior events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events before this one"></textarea>

          <label class="timeline-field-label">Following events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events after this one"></textarea>

          <label class="timeline-field-label">Contemporary events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events occurring at the same time"></textarea>

          <label class="timeline-field-label">Linked events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events visually linked"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Sub-timeline list -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Sub-timelines</div>
          <select id="subtimeline-select" class="timeline-select-input timeline-scroll-list" size="6">
            <option value="__all__">All sub-timelines</option>
            <option>Example Sub-timeline 1</option>
            <option>Example Sub-timeline 2</option>
          </select>
          <input id="subtimeline-rename-input" class="timeline-select-input" style="display:none;">
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Event list -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Events</div>
          <select class="timeline-select-input timeline-scroll-list" size="10">
            <option>Example Event 1</option>
            <option>Example Event 2</option>
            <option>Example Event 3</option>
          </select>
        </div>

      </form>
    </section>

    <!-- ============================================================
         TIMELINE VIEWPORT
         ============================================================ -->
    
    <section class="timeline-visual-viewport">
      <div id="timeline-panzoom-container" style="position: absolute; transform-origin: 0 0;">
        <div style="color:#555; padding:2rem; font-size:1.2rem;">
          Timeline map placeholder<br>
          (Pan + zoom area)
        </div>
      </div>
    </section>

  </main>
  
  <!-- ============================================================
       SETTINGS PANEL (OVERLAY)
       ============================================================ -->
  <div id="settings-panel" class="settings-panel">
    <h2 class="settings-title">Settings</h2>

    <label class="settings-label">
      <input type="checkbox" id="setting-sidebar-left">
      Sidebar on left side
    </label>

    <button id="settings-close-button" class="settings-close-button">
      Close Settings
    </button>
  </div>
  
  <div id="settings-backdrop" class="settings-backdrop"></div>
  
  <script> // Pan and Zoom
  document.addEventListener("DOMContentLoaded", () => {

    const viewport = document.querySelector(".timeline-visual-viewport");
    const content = document.getElementById("timeline-panzoom-container");
  
    // Current transform state
    let scale = 1;
    let originX = 0;
    let originY = 0;
  
    // Drag state
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
  
    // Apply transform
    function updateTransform() {
      content.style.transform =
        `translate(${originX}px, ${originY}px) scale(${scale})`;
    }
  
    // === DESKTOP DRAG PAN ===
    viewport.addEventListener("mousedown", (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });
  
    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      originX += dx;
      originY += dy;
      lastX = e.clientX;
      lastY = e.clientY;
      updateTransform();
    });
  
    window.addEventListener("mouseup", () => {
      isDragging = false;
    });
  
    // === DESKTOP WHEEL ZOOM ===
    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
  
      const zoomFactor = 1.1;
      const mouseX = e.clientX - viewport.getBoundingClientRect().left;
      const mouseY = e.clientY - viewport.getBoundingClientRect().top;
  
      const oldScale = scale;
      scale *= e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
  
      // Keep zoom centered on cursor
      originX = mouseX - (mouseX - originX) * (scale / oldScale);
      originY = mouseY - (mouseY - originY) * (scale / oldScale);
  
      updateTransform();
    }, { passive: false });
  
    // === MOBILE TOUCH PAN + PINCH ZOOM ===
    let touchMode = false;
    let lastTouchDist = 0;
  
    function getTouchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }
  
    viewport.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        // Single finger drag
        touchMode = "drag";
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        // Pinch zoom
        touchMode = "pinch";
        lastTouchDist = getTouchDist(e.touches);
      }
    });
  
    viewport.addEventListener("touchmove", (e) => {
      e.preventDefault();
  
      if (touchMode === "drag" && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        originX += dx;
        originY += dy;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        updateTransform();
      }
  
      if (touchMode === "pinch" && e.touches.length === 2) {
        const newDist = getTouchDist(e.touches);
        const zoomFactor = newDist / lastTouchDist;
        lastTouchDist = newDist;
  
        const oldScale = scale;
        scale *= zoomFactor;
  
        // Zoom around midpoint
        const rect = viewport.getBoundingClientRect();
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
  
        originX = midX - (midX - originX) * (scale / oldScale);
        originY = midY - (midY - originY) * (scale / oldScale);
  
        updateTransform();
      }
    }, { passive: false });
  
    viewport.addEventListener("touchend", () => {
      touchMode = false;
    });
  
  });
</script>

  <script> // Timeine Logic
    
    // Saving and loading the json
    
    let timelineData = null;
    
    document.getElementById("timeline-button-load-file").addEventListener("click", handleLoadTimeline);

    document.getElementById("timeline-button-save-file").addEventListener("click", handleSaveTimeline);
    
    function handleLoadTimeline() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json,application/json";
      
      input.onchange = async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        
        const text = await file.text();
        
        try {
          timelineData = JSON.parse(text);
          populateSubtimelineList();
          
          console.log("Loaded timeline:", timelineData);
          
          // renderTimeline(timelineData);
        } catch (err) {
          alert("Invalid JSON file.");
          console.error(err);
        }
      };
      
      input.click();
    }

    function handleSaveTimeline() {
      if (!timelineData) {
        alert("No timeline loaded.");
        return;
      }
      
      const json = JSON.stringify(timelineData, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement("a");
      a.href = url;
      a.download = "timeline.json";
      a.click();
      
      URL.revokeObjectURL(url);
    }
    
    // Handle Subtimelines
    
    // Detect double click on <select>
    const select = document.getElementById("subtimeline-select");
    const renameInput = document.getElementById("subtimeline-rename-input");
    
    select.addEventListener("dblclick", () => {
      const name = select.value;
      if (!name) return;
      
      // Show input
      renameInput.value = name;
      renameInput.style.display = "block";
      select.style.display = "none";
      
      renameInput.focus();
      renameInput.select();
    });
    
    // Handle rename confirmation
    renameInput.addEventListener("blur", commitRename);
    renameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") commitRename();
    });
    
    function commitRename() {
      const oldName = select.value;
      const newName = renameInput.value.trim();
      
      if (newName && newName !== oldName) {
        renameSubtimeline(timelineData, oldName, newName);
      }
      
      // Restore UI
      renameInput.style.display = "none";
      select.style.display = "block";
      
      // Rebuild list
      populateSubtimelineList();
      
      // Re-render timeline
      refreshTimeline();
    }
    
    // Recursively rename the subtimeline in the json
    function renameSubtimeline(node, oldName, newName) {
      if (!node || !node.subTimelines) return false;
      
      if (node.subTimelines[oldName]) {
        node.subTimelines[newName] = node.subTimelines[oldName];
        delete node.subTimelines[oldName];
        return true;
      }
      
      for (const child of Object.values(node.subTimelines)) {
        if (renameSubtimeline(child, oldName, newName)) return true;
      }
      
      return false;
    }
    
    // Refresh the timeline logic
    function refreshTimeline() {
      // Rebuild UI lists
      populateSubtimelineList();
      
      // Re-render the timeline
      renderTimeline(timelineData);
    }

    
    function collectSubtimelineNames(node, list) {
      if (!node || !node.subTimelines) return;
      
      for (const name of Object.keys(node.subTimelines)) {
        list.push(name);
        collectSubtimelineNames(node.subTimelines[name], list);
      }
    }
    
    function populateSubtimelineList() {
      const select = document.getElementById("subtimeline-select");
      select.innerHTML = "";
      
      // Add a blank option to allow deselection
      const blank = document.createElement("option");
      blank.value = "";
      blank.textContent = "(none)";
      select.appendChild(blank);
      
      // Recursively collect names
      const names = [];
      collectSubtimelineNames(timelineData, names);
      
      // Add each discovered sub-timeline
      for (const name of names) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      }
      
      // Default selection
      select.value = "";
    }
    
    // Add new subtimeline
    
    // Add Subtimeline Event Listener
    document.getElementById("timeline-button-add-subtimeline").addEventListener("click", handleAddSubtimeline);
    
    function handleAddSubtimeline() {
      const select = document.getElementById("subtimeline-select");
      const parentName = select.value;
      
      // If nothing is selected, treat this as adding to the root
      const isRoot = !parentName;

      
      const newName = prompt("Enter a name for the new sub-timeline:");
      if (!newName || !newName.trim()) return;
      
      // Insert into JSON
      if (isRoot) {
        // Add directly under the root
        timelineData.subTimelines[newName.trim()] = {
          events: [],
          subTimelines: {}
        };
      } else {
        // Add under the selected parent
        addSubtimeline(timelineData, parentName, newName.trim());
      }
      
      // Refresh UI
      populateSubtimelineList();
      renderTimeline(timelineData);
    }
    
    function addSubtimeline(node, targetName, newName) {
      if (!node || !node.subTimelines) return false;
      
      if (node.subTimelines[targetName]) {
        node.subTimelines[targetName].subTimelines[newName] = {
          events: [],
          subTimelines: {}
        };
        return true;
      }
      
      for (const child of Object.values(node.subTimelines)) {
        if (addSubtimeline(child, targetName, newName)) return true;
      }
      
      return false;
    }

  </script>

</body>
</html>
