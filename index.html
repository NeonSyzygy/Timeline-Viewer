<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timeline Viewer – Minimal DOM Layout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    /* ============================================================
       GLOBAL + RESET
       ============================================================ */

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* CRITICAL: body never scrolls */
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
    }

    /* ============================================================
       TOP MENU BAR
       ============================================================ */

    .timeline-top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 0.5rem;
      background: #111;
      border-bottom: 1px solid #333;
      color: #eee;
    }

    .timeline-top-bar-button {
      padding: 0.35rem 0.75rem;
      font-size: 0.85rem;
      border-radius: 3px;
      border: 1px solid #444;
      background: #333;
      color: #eee;
      cursor: pointer;
    }

    .timeline-top-bar-button:hover {
      background: #444;
    }
    
    .topbar-left {
      flex: 0 0 auto;
      font-weight: bold;
      padding-right: 0.5rem;
    }
    
    .topbar-scroll-buttons {
      flex: 1 1 auto;
      display: flex;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      gap: 0.5rem;
      padding: 0 0.5rem;
      scrollbar-width: none; /* Firefox */  
    }
    
    .topbar-scroll-buttons button:first-child {
      margin-left: auto;
    }
    
    .topbar-scroll-buttons::-webkit-scrollbar {
      display: none; /* Chrome/Safari */
    }
    
    .topbar-scroll-buttons button {
      flex: 0 0 auto;
      padding: 0.3rem 0.6rem;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      border-radius: 4px;
    }
    
    .topbar-settings-button {
      flex: 0 0 auto;
      padding: 0.3rem 0.6rem;
      background: #222;
      border: 1px solid #444;
      color: #eee;
      border-radius: 4px;
    }

    /* ============================================================
       MAIN LAYOUT ROOT
       Desktop: timeline left, sidebar right
       Mobile: sidebar top, timeline bottom
       ============================================================ */

    main.timeline-layout-root {
      display: flex;
      flex-direction: row-reverse; /* row | row-reverse */
      height: calc(100vh - 48px); /* full height minus top bar */
      width: 100%;
      overflow: hidden; /* prevent body scroll */
    }

    /* ============================================================
       OVERLAY SIDEBAR (INSTANT SHOW/HIDE)
       ============================================================ */

    /* Sidebar floats above the map on the right */
    .timeline-event-editor-panel {
      position: absolute;
      top: 48px; /* height of top bar */
      right: 0;
      width: 320px;
      height: calc(100vh - 48px);
      background: #181818;
      border-left: 1px solid #333;
      overflow-y: auto;
      overflow-x: hidden;
      transform: translateX(0); /* visible */
      z-index: 10;
    }
    
    /* Hidden state (desktop) */
    body.sidebar-hidden .timeline-event-editor-panel {
      transform: translateX(100%); /* instantly off-screen */
    }
    
    /* Timeline map becomes full-screen behind the sidebar */
    .timeline-visual-viewport {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: auto;
      z-index: 1;
    }
    
    /* ============================================================
       SIDEBAR LEFT/RIGHT TOGGLE
       ============================================================ */

    body.sidebar-left .timeline-event-editor-panel {
      right: auto;
      left: 0;
      border-left: none;
      border-right: 1px solid #333;
    }

    /* ============================================================
       TIMELINE VIEWPORT
       ============================================================ */

    .timeline-visual-viewport-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      text-align: center;
      padding: 1rem;
    }

    /* ============================================================
       FORM ELEMENTS
       ============================================================ */

    form.timeline-event-editor-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .timeline-field-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .timeline-field-label {
      font-size: 0.8rem;
      color: #aaa;
    }

    .timeline-text-input,
    .timeline-select-input,
    .timeline-multiline-input {
      width: 100%;
      padding: 0.3rem 0.4rem;
      font-size: 0.85rem;
      border-radius: 3px;
      border: 1px solid #444;
      background: #111;
      color: #eee;
    }

    .timeline-multiline-input {
      min-height: 3rem;
      resize: vertical;
    }

    .timeline-scroll-list {
      min-height: 5rem;
    }

    .timeline-small-helper-text {
      font-size: 0.7rem;
      color: #777;
    }

    .timeline-section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #ccc;
      margin: 0.25rem 0;
    }

    .timeline-horizontal-divider {
      border: none;
      border-top: 1px solid #333;
      margin: 0.5rem 0;
    }

    /* ============================================================
       RESPONSIVE MODE (MOBILE / NARROW)
       Sidebar becomes top panel, fixed height
       Timeline always visible at bottom
       ============================================================ */

    @media (max-width: 900px), (max-aspect-ratio: 3/4) {
    
      /* Sidebar floats above the map, full width */
      .timeline-event-editor-panel {
        top: 48px;
        left: 0;
        right: 0;
        width: 100%;
        height: 45%;
        border-left: none;
        border-bottom: 1px solid #333;
        transform: translateY(0); /* visible */
      }
    
      /* Hidden state (mobile) */
      body.sidebar-hidden .timeline-event-editor-panel {
        transform: translateY(-100%); /* instantly off-screen upward */
      }
    
      /* Timeline map fills the entire screen below the top bar */
      .timeline-visual-viewport {
        top: 48px;
        left: 0;
        right: 0;
        bottom: 0;
      }
    }
    
    /* ============================================================
       SETTINGS PANEL (OVERLAY)
       ============================================================ */

    .settings-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      max-width: 90vw;
      background: #222;
      border: 1px solid #333;
      padding: 1rem;
      color: #eee;
      transform: translate(-50%, -50%) scale(0.95);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }
    
    /* When open */
    body.settings-open .settings-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    
    .settings-title {
      margin-top: 0;
      font-size: 1.1rem;
      color: #ccc;
    }
    
    .settings-label {
      display: block;
      margin: 1rem 0;
      font-size: 0.9rem;
    }
    
    .settings-close-button {
      margin-top: 1rem;
      padding: 0.4rem 0.8rem;
      background: #333;
      border: 1px solid #444;
      color: #eee;
      cursor: pointer;
    }
    
    /* Optional backdrop */
    .settings-backdrop {
      position: absolute;
      inset: 48px 0 0 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      z-index: 15;
    }

    body.settings-open .settings-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    /* ============================================================
       Scrollbar styling for WebKit browsers
       ============================================================ */
    
    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    
    *::-webkit-scrollbar-track {
      background: #111;       /* track background */
    }
    
    *::-webkit-scrollbar-thumb {
      background: #444;       /* draggable part */
      border-radius: 5px;
    }
    
    *::-webkit-scrollbar-thumb:hover {
      background: #666;
    }
    
    /* ============================================================
       Scrollbar styling for Firefox
       ============================================================ */
    
    * {
      scrollbar-width: thin;          /* auto | thin | none */
      scrollbar-color: #444 #111;     /* thumb | track */
    }

  </style>
</head>

<body>

  <!-- ============================================================
       TOP MENU BAR
       ============================================================ -->
  <header class="timeline-top-bar">
  
    <div class="topbar-left">
      <h1 style="margin:0; font-size:1rem; color:#ccc;">Timeline Viewer</h1>
    </div>
    
    <div class="topbar-scroll-buttons">
      <button class="timeline-top-bar-button" id="timeline-button-load-file">Load File</button>
      <button class="timeline-top-bar-button" id="timeline-button-save-file">Save Timeline</button>
      <button class="timeline-top-bar-button" id="timeline-button-add-event">Add Event</button>
      <button class="timeline-top-bar-button" id="timeline-button-delete-selected-event">Delete Selected Event</button>
    </div>
    
    <button class="timeline-top-bar-button" id="timeline-button-open-settings">Settings</button>
    
  </header>

  <!-- ============================================================
       MAIN LAYOUT ROOT
       ============================================================ -->
  <main class="timeline-layout-root">

    <!-- ============================================================
         SIDEBAR PANEL (RIGHT SIDE BY DEFAULT)
         ============================================================ -->
    <section class="timeline-event-editor-panel">

      <form class="timeline-event-editor-form" autocomplete="off">

        <!-- Selected Event -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Selected Event</div>

          <label class="timeline-field-label" for="timeline-selected-event-name-input">
            Canonical event name (editable)
          </label>
          <input id="timeline-selected-event-name-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Event ID / canonical name">
        </div>

        <div class="timeline-field-group">
          <label class="timeline-field-label" for="timeline-selected-event-visual-override-input">
            Visual override (display name)
          </label>
          <textarea id="timeline-selected-event-visual-override-input"
                    class="timeline-multiline-input"
                    placeholder="Formatted display name"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Placement -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Placement</div>

          <label class="timeline-field-label" for="timeline-selected-event-sub-timeline-input">
            Sub-timeline
          </label>
          <input id="timeline-selected-event-sub-timeline-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Sub-timeline name">

          <label class="timeline-field-label" for="timeline-selected-event-column-input">
            Column
          </label>
          <input id="timeline-selected-event-column-input"
                 class="timeline-text-input"
                 type="text"
                 placeholder="Column index">
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Groups -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Groups</div>
          <textarea id="timeline-selected-event-groups-input"
                    class="timeline-multiline-input"
                    placeholder="Group names (ordered)"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Relationships -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Relationships</div>

          <label class="timeline-field-label">Prior events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events before this one"></textarea>

          <label class="timeline-field-label">Following events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events after this one"></textarea>

          <label class="timeline-field-label">Contemporary events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events occurring at the same time"></textarea>

          <label class="timeline-field-label">Linked events</label>
          <textarea class="timeline-multiline-input"
                    placeholder="Events visually linked"></textarea>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Sub-timeline list -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Sub-timelines</div>
          <select class="timeline-select-input timeline-scroll-list" size="6">
            <option value="__all__">All sub-timelines</option>
            <option>Example Sub-timeline 1</option>
            <option>Example Sub-timeline 2</option>
          </select>
        </div>

        <hr class="timeline-horizontal-divider">

        <!-- Event list -->
        <div class="timeline-field-group">
          <div class="timeline-section-title">Events</div>
          <select class="timeline-select-input timeline-scroll-list" size="10">
            <option>Example Event 1</option>
            <option>Example Event 2</option>
            <option>Example Event 3</option>
          </select>
        </div>

      </form>
    </section>

    <!-- ============================================================
         TIMELINE VIEWPORT
         ============================================================ -->
    
    <section class="timeline-visual-viewport">
      <div id="timeline-panzoom-container" style="position: absolute; transform-origin: 0 0;">
        <div style="color:#555; padding:2rem; font-size:1.2rem;">
          Timeline map placeholder<br>
          (Pan + zoom area)
        </div>
      </div>
    </section>

  </main>
  
  <!-- ============================================================
     SETTINGS PANEL (OVERLAY)
     ============================================================ -->
  <div id="settings-panel" class="settings-panel">
    <h2 class="settings-title">Settings</h2>

    <label class="settings-label">
      <input type="checkbox" id="setting-sidebar-left">
      Sidebar on left side
    </label>

    <button id="settings-close-button" class="settings-close-button">
      Close Settings
    </button>
  </div>
  
  <div id="settings-backdrop" class="settings-backdrop"></div>
  
  <script> // UI Controls
    document.addEventListener("DOMContentLoaded", () => {
    
      // Buttons
      const settingsButton = document.getElementById("timeline-button-open-settings");
      const settingsPanel = document.getElementById("settings-panel");
      const settingsBackdrop = document.getElementById("settings-backdrop");
      const settingsClose = document.getElementById("settings-close-button");
      
      const sidebarLeftCheckbox = document.getElementById("setting-sidebar-left");
      
      // === SETTINGS PANEL OPEN/CLOSE ===
      
      settingsButton.addEventListener("click", () => {
        document.body.classList.add("settings-open");
      });
      
      settingsClose.addEventListener("click", () => {
        document.body.classList.remove("settings-open");
      });
      
      settingsBackdrop.addEventListener("click", () => {
        document.body.classList.remove("settings-open");
      });
      
      // === SIDEBAR LEFT/RIGHT SETTING ===
      
      sidebarLeftCheckbox.addEventListener("change", () => {
        if (sidebarLeftCheckbox.checked) {
          document.body.classList.add("sidebar-left");
        } else {
          document.body.classList.remove("sidebar-left");
        }
      });
      
      // === SIDEBAR SHOW/HIDE ===
      // You will later call these from your timeline logic:
      window.showSidebar = () => document.body.classList.remove("sidebar-hidden");
      window.hideSidebar = () => document.body.classList.add("sidebar-hidden");

    });
    
    // Make top bar scroll horizontally
    const scrollArea = document.querySelector('.topbar-scroll-buttons');
    
    scrollArea.addEventListener('wheel', (e) => {
      if (e.deltaY !== 0) {
        e.preventDefault();
        scrollArea.scrollLeft += e.deltaY;
      }
    }, { passive: false });
  </script>
  
  <script> // Pan and Zoom
  document.addEventListener("DOMContentLoaded", () => {

    const viewport = document.querySelector(".timeline-visual-viewport");
    const content = document.getElementById("timeline-panzoom-container");
  
    // Current transform state
    let scale = 1;
    let originX = 0;
    let originY = 0;
  
    // Drag state
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
  
    // Apply transform
    function updateTransform() {
      content.style.transform =
        `translate(${originX}px, ${originY}px) scale(${scale})`;
    }
  
    // === DESKTOP DRAG PAN ===
    viewport.addEventListener("mousedown", (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });
  
    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      originX += dx;
      originY += dy;
      lastX = e.clientX;
      lastY = e.clientY;
      updateTransform();
    });
  
    window.addEventListener("mouseup", () => {
      isDragging = false;
    });
  
    // === DESKTOP WHEEL ZOOM ===
    viewport.addEventListener("wheel", (e) => {
      e.preventDefault();
  
      const zoomFactor = 1.1;
      const mouseX = e.clientX - viewport.getBoundingClientRect().left;
      const mouseY = e.clientY - viewport.getBoundingClientRect().top;
  
      const oldScale = scale;
      scale *= e.deltaY < 0 ? zoomFactor : 1 / zoomFactor;
  
      // Keep zoom centered on cursor
      originX = mouseX - (mouseX - originX) * (scale / oldScale);
      originY = mouseY - (mouseY - originY) * (scale / oldScale);
  
      updateTransform();
    }, { passive: false });
  
    // === MOBILE TOUCH PAN + PINCH ZOOM ===
    let touchMode = false;
    let lastTouchDist = 0;
  
    function getTouchDist(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }
  
    viewport.addEventListener("touchstart", (e) => {
      if (e.touches.length === 1) {
        // Single finger drag
        touchMode = "drag";
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
      } else if (e.touches.length === 2) {
        // Pinch zoom
        touchMode = "pinch";
        lastTouchDist = getTouchDist(e.touches);
      }
    });
  
    viewport.addEventListener("touchmove", (e) => {
      e.preventDefault();
  
      if (touchMode === "drag" && e.touches.length === 1) {
        const dx = e.touches[0].clientX - lastX;
        const dy = e.touches[0].clientY - lastY;
        originX += dx;
        originY += dy;
        lastX = e.touches[0].clientX;
        lastY = e.touches[0].clientY;
        updateTransform();
      }
  
      if (touchMode === "pinch" && e.touches.length === 2) {
        const newDist = getTouchDist(e.touches);
        const zoomFactor = newDist / lastTouchDist;
        lastTouchDist = newDist;
  
        const oldScale = scale;
        scale *= zoomFactor;
  
        // Zoom around midpoint
        const rect = viewport.getBoundingClientRect();
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
  
        originX = midX - (midX - originX) * (scale / oldScale);
        originY = midY - (midY - originY) * (scale / oldScale);
  
        updateTransform();
      }
    }, { passive: false });
  
    viewport.addEventListener("touchend", () => {
      touchMode = false;
    });
  
  });
</script>


</body>
</html>
